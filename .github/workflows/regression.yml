name: regression

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "pm-prd-copilot/**"
      - "governance/**"
      - "registry/**"
      - "workflow/**"
      - "harness/**"
      - "shared/**"
      - "projects/**"
      - "requirements.txt"

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh demo pipeline outputs
        run: python3 pm-prd-copilot/scripts/run_pipeline.py --base-dir . --project demo-project --stage all

      - name: Run regression
        run: python3 pm-prd-copilot/scripts/run_regression.py --base-dir . --strict

      - name: Run governance harness
        run: python3 harness/run_harness.py --base-dir . --project demo-project --mode advisory --audit
