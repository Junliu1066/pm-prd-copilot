version: 0.1.0
description: Cross-domain evaluation cases for checking whether PM Copilot skills remain reusable and stable.

requirements:
  minimum_cases: 5
  minimum_unique_domains: 5
  required_case_assertions:
    - broad_user_segments_before_narrowing
    - direct_and_indirect_competitors
    - source_trace_for_external_data
    - preview_before_full_prototype
    - project_preferences_do_not_leak
    - prd_visuals_are_section_local
    - page_specs_and_flow_present
    - prd_prototype_layer_present
    - default_wireframes_are_not_forced
    - non_ai_omits_ai_model_selection

cases:
  - case_id: fitness_training_app
    domain: consumer_health
    product_prompt: "Create a PRD path for a mobile product that helps exercise users execute a planned routine and manage short rest periods."
    market_scope_rule: "Use only the request or approved preference cache to resolve market scope."
    expected_skills:
      - source-collector
      - user-universe-mapper
      - pain-needs-analyzer
      - competitor-gap-analyzer
      - scenario-roi-ranker
      - mvp-scope-decider
      - product-flow-mapper
      - low-fi-prototype-designer
    expected_outputs:
      - source_brief
      - user_universe
      - pain_needs
      - competitor_gap
      - scenario_ranking
      - mvp_scope
      - product_flow_map
      - prototype_preview
    quality_assertions:
      - broad_user_segments_before_narrowing
      - direct_and_indirect_competitors
      - source_trace_for_external_data
      - preview_before_full_prototype
      - project_preferences_do_not_leak
      - prd_visuals_are_section_local
      - page_specs_and_flow_present
      - prd_prototype_layer_present
      - default_wireframes_are_not_forced
      - non_ai_omits_ai_model_selection
      - system_reminder_vs_auto_advance_is_explicit

