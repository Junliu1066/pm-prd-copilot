version: 0.1.0

rules:
  - id: chief-does-not-bypass-substeward
    severity: warn
    description: Chief steward should not directly call department skills once a sub-steward exists for that domain.
  - id: mcp-data-only
    severity: fail
    description: MCP outputs must be source data or source traces, not product recommendations.
  - id: skill-declared-artifacts-only
    severity: fail
    description: Skills can only write artifacts declared in registry/skills.yaml.
  - id: no-memory-write-without-approval
    severity: fail
    description: Memory updates must remain proposals unless human approval is recorded.
  - id: no-prd-before-mvp-gate
    severity: warn
    description: PRD drafting should not proceed before MVP scope is approved or marked as an assumption.
  - id: external-sources-need-trace
    severity: fail
    description: External source data must include source URL, source type, collection time, extractor, confidence, and human verification requirement.
  - id: stable-contract-change-owner-review
    severity: fail
    description: Changes to interfaces, harness behavior, schemas, workflow, registry, automations, templates, or generator contracts must name the responsible steward, expected affected files, validation command, and user approval point before implementation.
  - id: interface-artifact-contract-registered
    severity: fail
    description: Any data passed between workflow actions, scripts, Skills, harness checks, or package builders must either be registered in registry/artifacts.yaml or explicitly documented as an external/raw input with owner and retention handling.
  - id: harness-readonly-boundary
    severity: warn
    description: Harness and eval commands must state whether they are read-only or write reports/state files; read-only audits should not refresh project artifacts or run status.
  - id: generator-contract-sync
    severity: fail
    description: PRD or development-document generator changes must keep template, schema, prompt builder, renderer, regression cases, and sample outputs aligned or record the unsynced files as explicit follow-up risks.
  - id: automation-contract-health-owner
    severity: warn
    description: Automation checks must verify cwd, branch/worktree target, referenced template paths, model, reasoning effort, schedule, report location, and whether the task can modify files.
