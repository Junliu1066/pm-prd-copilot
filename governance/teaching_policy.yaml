version: 0.1.0
description: Teaching governance policy for converting user coaching into supervised system learning.

teacher:
  id: pm-coach
  reports_to:
    - user
  can:
    - capture_feedback
    - classify_lessons
    - route_lessons_to_skills
    - propose_memory_updates
    - propose_skill_updates
    - propose_harness_rules
    - check_lesson_absorption
  cannot:
    - directly_update_memory
    - directly_modify_skills
    - approve_own_proposals
    - override_user_decisions
    - verify_external_truth

lesson_types:
  - one_off_correction
  - user_preference
  - general_pm_principle
  - workflow_rule
  - harness_rule
  - skill_improvement

lesson_statuses:
  - proposed
  - accepted
  - rejected
  - superseded

approval_required:
  - accepted_lesson
  - memory_update
  - skill_update
  - harness_rule_update

absorption_requirements:
  accepted_lessons_must_have:
    - lesson_id
    - lesson_type
    - principle
    - affected_components
    - expected_behavior
    - verification_hint
  open_lessons_must_have:
    - lesson_id
    - user_feedback
    - proposed_interpretation
    - status
  affected_components_allowed:
    - agent
    - workflow
    - registry
    - harness
    - source-collector
    - user-universe-mapper
    - pain-needs-analyzer
    - scenario-roi-ranker
    - competitor-gap-analyzer
    - mvp-scope-decider
    - prototype-reference-analyzer
    - product-flow-mapper
    - low-fi-prototype-designer
    - interactive-html-prototype-builder
    - project-preference-cache-manager
    - skill-generalization-auditor
    - technical-scope-planner
    - release-roadmap-planner
    - effort-estimator
    - delivery-effect-definer
    - delivery-quality-reviewer
    - agentic-delivery-orchestrator
    - capability-enablement-planner
    - skill-mcp-routing-planner
    - development-governance-orchestrator
    - codex-task-package-writer
    - ai-capability-mapper
    - model-selection-planner
    - prompt-architecture-designer
    - rag-architecture-planner
    - conversation-memory-planner
    - learner-profile-modeler
    - adaptive-coaching-planner
    - ai-technical-architecture-planner
    - ai-solution-reviewer
    - skill-update-proposer
    - prd-structure-planner
    - prd-draft-writer
    - prd-quality-reviewer
    - prd-template
    - prd-schema
    - requirement-intake
    - development-document-policy
    - learning-steward
    - random-audit-inspector
    - efficiency-steward
