  tracking-plan-designer:
    status: candidate
    steward: prd-writing-steward
    stage: prd_drafting
    description: Design metrics, events, properties, triggers, and QA checks.
    reads:
      - source_brief
      - mvp_scope
      - prd_document
    writes:
      - tracking_plan
      - success_metrics
    forbidden_outputs:
      - memory_proposal
    requires_human_approval: false
    requires_sources: false
  prd-quality-reviewer:
    status: candidate
    steward: review-steward
    stage: review
    description: Review PRD completeness, reasoning quality, missing modules, and likely review questions.
    reads:
      - prd_document
      - prd_markdown
      - source_brief
    writes:
      - prd_quality_report
      - pre_dev_questions
    forbidden_outputs:
      - memory_proposal
    requires_human_approval: false
    requires_sources: false
  memory-learning-extractor:
    status: draft
    steward: learning-steward
    stage: learning
    description: Extract supervised learning proposals from generated and final artifacts.
    reads:
      - prd_markdown
      - final_prd_markdown
    writes:
      - memory_proposal
    forbidden_outputs:
      - memory_update
      - skill_update
    requires_human_approval: true
    requires_sources: false
