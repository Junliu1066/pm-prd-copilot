version: 0.1.0

skills:
  source-collector:
    status: candidate
    plugin: prd-analysis-suite
    path: plugins/prd-analysis-suite/skills/source-collector
    steward: research-steward
    stage: intake
    description: Normalize raw inputs into source brief artifacts.
    reads:
      - raw_input
      - source_brief
      - raw_external_data
      - web_source
      - app_reviews
    writes:
      - source_brief
      - source_brief_markdown
      - intake_source_notes
      - market_signals
      - user_feedback_signals
    forbidden_outputs:
      - mvp_scope
      - prd_document
      - memory_proposal
    requires_human_approval: false
    requires_sources: false
  pdf-prd-style-learner:
    status: candidate
    steward: research-steward
    stage: evidence
    description: Learn replaceable PRD structure and style preferences from historical PDFs.
    reads:
      - raw_external_data
    writes:
      - prd_style_signals
    forbidden_outputs:
      - prd_document
      - memory_update
    requires_human_approval: true
    requires_sources: true
  user-universe-mapper:
    status: candidate
    plugin: prd-analysis-suite
    path: plugins/prd-analysis-suite/skills/user-universe-mapper
    steward: product-judgment-steward
    stage: user_analysis
    description: Map all plausible target user groups before narrowing.
    reads:
      - source_brief
      - market_signals
    writes:
      - user_universe
    forbidden_outputs:
      - mvp_scope
      - prd_document
    requires_human_approval: false
    requires_sources: false
  pain-needs-analyzer:
    status: candidate
    plugin: prd-analysis-suite
    path: plugins/prd-analysis-suite/skills/pain-needs-analyzer
    steward: product-judgment-steward
    stage: user_analysis
    description: Analyze pain, needs, root causes, and desired time/cost savings for each user group.
    reads:
      - source_brief
      - user_universe
    writes:
      - pain_needs
    forbidden_outputs:
      - prd_document
      - memory_proposal
    requires_human_approval: false
    requires_sources: false
  scenario-roi-ranker:
    status: candidate
    plugin: prd-analysis-suite
    path: plugins/prd-analysis-suite/skills/scenario-roi-ranker
    steward: product-judgment-steward
