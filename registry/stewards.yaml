version: 0.1.0

chief_stewards:
  pm-copilot-chief:
    status: active
    responsibilities:
      - workflow_state
      - manifest_creation
      - steward_assignment
      - stage_gate_control
      - harness_enforcement
      - human_escalation
    max_direct_skills: 5
    max_direct_mcps: 2

sub_stewards:
  research-steward:
    status: active
    domain: research
    responsibilities:
      - source_collection
      - prd_style_learning
      - competitor_source_collection
      - user_feedback_collection
    allowed_stages:
      - intake
      - evidence
  product-judgment-steward:
    status: active
    domain: product_judgment
    responsibilities:
      - user_universe_mapping
      - pain_needs_analysis
      - scenario_roi_ranking
      - mvp_scope_recommendation
    allowed_stages:
      - user_analysis
      - scenario_priority
      - mvp_scope
  prd-writing-steward:
    status: active
    domain: writing
    responsibilities:
      - prd_structure_planning
      - prd_drafting
      - flow_page_spec_writing
      - user_story_generation
      - tracking_plan_design
    allowed_stages:
      - prd_planning
      - prd_drafting
  review-steward:
    status: active
    domain: review
    responsibilities:
      - prd_quality_review
      - risk_edgecase_review
      - pre_dev_question_generation
    allowed_stages:
      - review
  learning-steward:
    status: draft
    domain: learning
    responsibilities:
      - memory_learning_proposal
      - skill_upgrade_proposal
      - regression_review
    allowed_stages:
      - learning

inspectors:
  random-audit-inspector:
    status: candidate
    domain: governance
    responsibilities:
      - random_skill_output_audit
      - mcp_source_trace_audit
      - steward_boundary_audit
      - artifact_scope_audit
      - supervisor_escalation
    reports_to:
      - pm-copilot-chief
      - user
    cannot:
      - modify_artifacts
      - update_memory
      - change_skill_status
      - verify_external_truth

teachers:
  pm-coach:
    status: candidate
    domain: teaching
    responsibilities:
      - capture_user_feedback
      - classify_lessons
      - propose_memory_updates
      - propose_skill_updates
      - propose_harness_rules
      - check_lesson_absorption
    reports_to:
      - user
    cannot:
      - directly_update_memory
      - directly_modify_skills
      - approve_own_proposals
      - override_user_decisions
      - verify_external_truth

efficiency:
  efficiency-steward:
    status: active
    domain: governance
    responsibilities:
      - inspect_run_cost
      - inspect_artifact_size
      - inspect_skill_call_count
      - inspect_mcp_call_count
      - detect_repeated_outputs
      - propose_skill_optimization
    reports_to:
      - pm-copilot-chief
      - user
    cannot:
      - modify_artifacts
      - remove_skill
      - update_memory
      - lower_quality_thresholds
      - approve_own_proposals
